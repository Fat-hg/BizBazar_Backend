version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: bizbazar_prod_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bizbazar_prod_password
      POSTGRES_DB: bizbazar
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: bizbazar_prod_backend
    restart: always
    environment:
      - PORT=3001
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=bizbazar
      - DB_USER=postgres
      - DB_PASSWORD=bizbazar_prod_password
      - JWT_SECRET=super_secret_bizbazar_prod_key_2024
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - BIGQUERY_PROJECT_ID=${BIGQUERY_PROJECT_ID:-data-from-software}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-benchmarking_warehouse}
      - BIGQUERY_TABLE=${BIGQUERY_TABLE:-daily_query_metrics}
    depends_on:
      - database
    ports:
      - "3001:3001"

volumes:
  postgres_prod_data:
